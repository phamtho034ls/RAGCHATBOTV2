# Override cờ RAG theo pattern (áp dụng sau map/sync) để dễ audit/versioning.
flag_overrides:
  - name: structured_summary_single_source
    patterns:
      - '(?i)(tóm\s*tắt|tóm\s*lược).{0,80}(cấu\s*trúc|các\s*cột|báo\s*cáo)'
    set_flags:
      is_legal_lookup: false
      use_multi_article: false
      needs_expansion: false

  - name: structured_drafting_single_source
    patterns:
      - '(?i)(lập|soạn|khung|checklist).{0,80}(cấu\s*trúc|các\s*cột|báo\s*cáo)'
    set_flags:
      is_legal_lookup: false
      use_multi_article: false
      needs_expansion: true

  - name: explain_mandatory_dossier_doc
    patterns:
      - '(?i)giải\s*thích.{0,80}(tài\s*liệu\s*bắt\s*buộc|bắt\s*buộc\s+trong\s+hồ\s*sơ)'
    set_flags:
      is_legal_lookup: false
      use_multi_article: false
      needs_expansion: true

  - name: violation_invalid_eligibility_for_establishment
    patterns:
      - '(?i)không\s+đáp\s+ứng.{0,40}điều\s*kiện.{0,40}(thành\s*lập|hoạt\s*động)'
    set_flags:
      is_legal_lookup: true
      use_multi_article: false
      needs_expansion: false

  - name: violation_missing_commitment_or_supplement
    patterns:
      - '(?i)(yêu\s*cầu\s*bổ\s*sung|không\s*đạt\s*điều\s*kiện\s*xét)'
    set_flags:
      is_legal_lookup: false
      use_multi_article: false
      needs_expansion: true

  - name: legal_lookup_broad_statute_qa
    patterns:
      - '(?i)thời\s*hiệu\s+xử\s*phạt\s+vi\s*phạm\s+hành\s*chính'
      - '(?i)ngành.{0,20}nghề.{0,40}ưu\s*đãi\s*đầu\s*tư.{0,60}địa\s*bàn\s+ưu\s*đãi\s*đầu\s*tư'
    set_flags:
      is_legal_lookup: false
      use_multi_article: false
      needs_expansion: false

  - name: public_investment_classification_criteria
    patterns:
      - '(?i)tiêu\s*chí\s+phân\s*loại.{0,40}dự\s*án\s*đầu\s*tư\s*công'
    set_flags:
      is_legal_lookup: false
      use_multi_article: true
      needs_expansion: false
